<mat-toolbar class="footer" [style.height.px]="75">
    <div class="media-album-info">
        <img id="current-album-cover"
            src="https://media.pitchfork.com/photos/5929abfe5e6ef95969321857/1:1/w_320/a0536854.jpg">
        <div id="current-album-info">
            <div id="current-song-title">A Bad Dream</div>
            <div id="current-song-artist">Keane</div>
        </div>
    </div>
    <div class="media-controls-container">
        <div class="main-media-controls-container">
            <mat-icon class="media-controls material-icons-round" id="button-shuffle" fontIcon="shuffle" />
            <mat-icon class="media-controls material-icons-round" id="button-skip_previous" fontIcon="skip_previous" />
            <mat-icon class="media-controls material-icons-round" id="button-play" fontIcon="play_circle" />
            <mat-icon class="media-controls material-icons-round" id="button-skip_next" fontIcon="skip_next" />
            <mat-icon class="media-controls material-icons-round" id="button-repeat" fontIcon="repeat" />
            <div class="seekbar-container">
                <span class="track-time" id="seekbar-value">{{ playbackValue.value! * 1000 | date:'m:ss' }}</span>
                <mat-slider class="seekBar" [disabled]="disabled" [max]="max" [min]="min" [step]="step"
                    [discrete]="thumbLabel" [showTickMarks]="showTicks">
                    <input class="seekBarThumb" (sliderValue)="playbackValue.valueChanges" disableRipple matSliderThumb [formControl]="playbackValue">
                </mat-slider>
                <span class="track-time" id="seekbar-max-value">{{ max * 1000 | date:'m:ss' }}</span>
            </div>
        </div>
        <div class="media-controls-misc">
            <mat-icon class="media-controls material-icons-round" id="button-lyrics" fontIcon="lyrics" />
        </div>
        <div class="media-controls-misc">
            <mat-icon class="media-controls material-icons-round" id="button-queue" fontIcon="queue_music" />
        </div>
        <div class="media-controls-volume">
            <mat-icon class="media-controls material-icons-round" id="button-mute" fontIcon="volume_up" />
            <mat-slider id="seekbar-volume" [disabled]="disabled" [max]="volMax" [min]="volMin" [step]="volStep"
            [discrete]="thumbLabel" [showTickMarks]="showTicks">
                <input (sliderValue)="volumeValue.valueChanges" id="volumeValue" [formControl]="volumeValue" disableRipple matSliderThumb>
            </mat-slider>
        </div>
    </div>
</mat-toolbar>
